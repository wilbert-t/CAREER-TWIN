services:
  backend:
    build:
      context: .                        # career-twin/ — gives access to knowledge_base/
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env                    # put GROQ_API_KEY here (never commit this file)
    environment:
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - chroma_data:/app/backend/chroma_db   # persist vector store across restarts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  chroma_data:
